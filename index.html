<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Видео Монтажи PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Прелоадер -->
    <div class="preloader">
        <div class="loader">
            <div class="fire"></div>
            <div class="fire"></div>
            <div class="fire"></div>
            <p>Загрузка...</p>
        </div>
    </div>

    <!-- Шапка -->
    <header>
        <h1 class="logo glitch" data-text="VIDEO PRO">MIRAJE | VIDEO PRO</h1>
        <p>Лучшие монтажи с эффектами</p>
        
        <div class="controls">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Поиск видео...">
                <button><i class="fas fa-search"></i></button>
            </div>
            
            <div class="sort-options">
                <select id="sortSelect">
                    <option value="newest">Сначала новые</option>
                    <option value="oldest">Сначала старые</option>
                    <option value="popular">По популярности</option>
                </select>
            </div>
            
            <button id="themeToggle"><i class="fas fa-moon"></i></button>
        </div>
    </header>

    <!-- Основной контент -->
    <main>
        <div class="video-grid" id="videoContainer">
            <!-- Видео будут загружаться здесь -->
        </div>
    </main>

    <!-- Подвал -->
    <footer>
        <div class="social-links">
            <a href="https://vk.com/thetemirbolatov"><i class="fab fa-vk"></i></a>
            <a href="https://instagram.com/thetemirbolatov"><i class="fab fa-instagram"></i></a>
           <a href="https://t.me/thetemirbolatov"><i class="fab fa-telegram"></i></a> 
        </div>
        <p>© 2025 MIRAJE VIDEO PRO | Все права защищены</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
