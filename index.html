<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карачаевский Переводчик</title>
    <style>
        body {
            background: url('/static/image/sn.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        input[type="text"] {
            padding: 10px;
            width: 300px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .translation {
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 5px;
            width: 300px;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Переводчик</h1>
        <form method="POST">
            <input type="text" name="word" placeholder="Введите слово" required>
            <button type="submit">Перевести</button>
        </form>
        <div class="translation">{{ translation }}</div>
        <div>
            <a href="https://vk.com/thetemirbolatov" target="_blank"><button>VK</button></a>
            <a href="https://instagram.com/thetemirbolatov" target="_blank"><button>Instagram</button></a>
        </div>
    </div>
</body>
</html>
